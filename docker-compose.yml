version: '3.9'
services:
  api:
    build:
      context: ./backend
      dockerfile: docker/app.Dockerfile
    env_file: .env
    environment:
      - DATA_DIR=/data
    ports:
      - '8000:8000'
    volumes:
      - ./data:/data
    depends_on:
      - redis
  worker:
    build:
      context: ./backend
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      - ./data:/data
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - api
